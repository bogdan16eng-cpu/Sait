<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>RR Departments Chart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #0f1419;
    color: #e8e8e8;
    padding: 20px;
  }
  h1 { margin: 0 0 8px 0; color: #ffd36b; font-size: 22px; }
  .sub { color: #8aa; font-size: 13px; margin-bottom: 16px; }
  .panel {
    background: #1a2028;
    border: 1px solid #2a323c;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .config-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .config-row label {
    font-size: 12px;
    color: #aac;
    margin-right: 4px;
  }
  select, button {
    background: #252d38;
    color: #e8e8e8;
    border: 1px solid #3a4452;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
  }
  button {
    background: #3a6ea5;
    cursor: pointer;
    border-color: #3a6ea5;
  }
  button:hover { background: #4a85c5; }
  .status {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    display: inline-block;
  }
  .status.ok { background: #1f3a26; color: #8fdc8f; }
  .status.err { background: #3a1f1f; color: #ff8f8f; }
  .status.info { background: #1f2a3a; color: #8fc0dc; }

  /* Мульти-селект чіпами */
  .dept-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .dept-chip {
    background: #252d38;
    border: 1px solid #3a4452;
    color: #aac;
    padding: 5px 10px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  .dept-chip:hover { border-color: #5a6472; color: #e8e8e8; }
  .dept-chip.active {
    background: #3a6ea5;
    border-color: #4a85c5;
    color: #fff;
  }
  .dept-chip.active:hover { background: #4a85c5; }
  .dept-chips-actions {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    font-size: 11px;
  }
  .dept-chips-actions a {
    color: #8fc0dc;
    cursor: pointer;
    text-decoration: underline;
  }

  #chart-wrapper { position: relative; height: 480px; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .stat-card {
    background: #252d38;
    border-radius: 6px;
    padding: 10px;
    border-left: 3px solid #3a6ea5;
  }
  .stat-card .name { font-size: 11px; color: #aac; }
  .stat-card .val { font-size: 18px; font-weight: bold; color: #ffd36b; }
  .stat-card .delta { font-size: 11px; margin-top: 2px; }
  .delta.up { color: #6fdb6f; }
  .delta.down { color: #ff6f6f; }
  .delta.same { color: #888; }
</style>
</head>
<body>

<h1>🏛️ RivalRegions — Department Tracker</h1>
<div class="sub">Публічна статистика по Україні (4307). Дані збираються автоматично раз на 30 хвилин.</div>

<div class="panel">
  <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
    <div style="color: #aac; font-size: 12px;">Оберіть департаменти (клік по чіпах):</div>
    <div>
      <button id="refresh-btn">🔄 Оновити</button>
      <span id="status" class="status info">Завантаження...</span>
    </div>
  </div>
  <div class="dept-chips" id="dept-chips"></div>
  <div class="dept-chips-actions">
    <a id="select-all">виділити всі</a>
    <a id="select-none">зняти всі</a>
  </div>
</div>

<div class="panel">
  <div class="config-row">
    <label>Період:</label>
    <select id="range-select">
      <option value="0.5">30 хвилин</option>
      <option value="1">1 година</option>
      <option value="24">24 години</option>
      <option value="168" selected>7 днів</option>
      <option value="720">30 днів</option>
      <option value="all">Усі дані</option>
    </select>
  </div>
</div>

<div class="panel">
  <div id="chart-wrapper">
    <canvas id="chart"></canvas>
  </div>
  <div class="stats" id="stats"></div>
</div>

<script>
// ============================================================
// КОНФІГ — тільки Bin ID
// Бін на jsonbin.io має бути ПУБЛІЧНИМ (Private toggle = OFF)
// Тоді його можна читати БЕЗ ключа, а писати тільки з Master Key (у userscript)
// ============================================================
const CONFIG = {
  JSONBIN_BIN_ID: '69e9020336566621a8de97c2',
};

const LS_KEY = 'rr-chart-ui-v2';
let chartInstance = null;
let currentHistory = [];
let selectedDepts = new Set();

// ================ UI state persistence ================
function loadUI() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveUI() {
  localStorage.setItem(LS_KEY, JSON.stringify({
    selected: [...selectedDepts],
    range: document.getElementById('range-select').value,
  }));
}

// ================ Status ================
function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + (type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'info');
  el.textContent = msg;
}

// ================ Data load ================
async function fetchFromJsonBin() {
  if (!CONFIG.JSONBIN_BIN_ID || CONFIG.JSONBIN_BIN_ID.startsWith('ВСТАВ')) {
    throw new Error('Bin ID не налаштований у index.html (відкрий файл і впиши BIN ID)');
  }
  const resp = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}/latest`);
  if (!resp.ok) {
    if (resp.status === 401 || resp.status === 403) {
      throw new Error('Доступ заборонено. Зроби бін публічним на jsonbin.io.');
    }
    throw new Error(`HTTP ${resp.status}`);
  }
  const json = await resp.json();
  const rec = json.record !== undefined ? json.record : json;
  if (!rec || !Array.isArray(rec.history)) throw new Error('У bin немає поля history[]');
  return rec.history;
}

async function loadData() {
  setStatus('info', 'Завантаження...');
  try {
    const history = await fetchFromJsonBin();
    currentHistory = history;
    setStatus('ok', `Завантажено ${history.length} записів`);
    rebuildDeptChips();
    drawChart();
  } catch (e) {
    setStatus('err', 'Помилка: ' + e.message);
  }
}

// ================ Dept chips (multi-select) ================
function rebuildDeptChips() {
  const container = document.getElementById('dept-chips');
  const names = new Set();
  currentHistory.forEach(entry => {
    (entry.departments || []).forEach(d => names.add(d.name || '(без назви)'));
  });
  const sortedNames = [...names].sort();

  const saved = loadUI();
  if (saved.selected && Array.isArray(saved.selected) && saved.selected.length > 0) {
    selectedDepts = new Set(saved.selected.filter(n => names.has(n)));
    if (selectedDepts.size === 0) selectedDepts = new Set(sortedNames);
  } else if (selectedDepts.size === 0) {
    selectedDepts = new Set(sortedNames);
  }

  container.innerHTML = sortedNames.map(name => {
    const active = selectedDepts.has(name) ? 'active' : '';
    return `<div class="dept-chip ${active}" data-name="${encodeURIComponent(name)}">${name}</div>`;
  }).join('');

  container.querySelectorAll('.dept-chip').forEach(el => {
    el.addEventListener('click', () => {
      const name = decodeURIComponent(el.dataset.name);
      if (selectedDepts.has(name)) selectedDepts.delete(name);
      else selectedDepts.add(name);
      el.classList.toggle('active');
      saveUI();
      drawChart();
    });
  });
}

// ================ Filtering ================
function filterByRange(history) {
  const range = document.getElementById('range-select').value;
  if (range === 'all') return history;
  const hours = parseFloat(range);
  const cutoff = Date.now() - hours * 3600 * 1000;
  return history.filter(e => e.ts >= cutoff);
}

// ================ Chart ================
const COLORS = [
  '#ffd36b','#6fdb6f','#6fb0ff','#ff6fb0','#b06fff','#ffa06f','#6fdbdb',
  '#db6fdb','#dbdb6f','#a0a0ff','#ff6f6f','#70ddae','#ddae70','#70aedd'
];

function drawChart() {
  const history = filterByRange(currentHistory).slice().sort((a,b) => a.ts - b.ts);

  const seriesMap = new Map();

  history.forEach(entry => {
    (entry.departments || []).forEach(d => {
      const name = d.name || '(без назви)';
      if (!selectedDepts.has(name)) return;
      if (!seriesMap.has(name)) seriesMap.set(name, []);
      seriesMap.get(name).push({ x: entry.ts, y: d.workers });
    });
  });

  const datasets = [...seriesMap.entries()].map(([name, data], i) => ({
    label: name,
    data: data,
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + '33',
    tension: 0.25,
    pointRadius: 2,
    borderWidth: 2,
  }));

  // Діапазон по X: заповнюємо всю ширину графіку, точки починаються ЗЛІВА
  let xMin, xMax;
  const range = document.getElementById('range-select').value;
  const now = Date.now();

  if (range !== 'all') {
    const hours = parseFloat(range);
    const windowMs = hours * 3600 * 1000;
    xMax = now;
    xMin = now - windowMs;
  } else if (history.length > 0) {
    xMin = history[0].ts;
    xMax = Math.max(now, history[history.length - 1].ts);
    if (xMin === xMax) {
      xMin -= 15 * 60 * 1000;
      xMax += 15 * 60 * 1000;
    }
  } else {
    xMin = now - 3600 * 1000;
    xMax = now;
  }

  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: false },
      plugins: {
        legend: { labels: { color: '#e8e8e8' }, position: 'bottom' },
        tooltip: {
          callbacks: {
            title: (items) => new Date(items[0].parsed.x).toLocaleString('uk-UA'),
            label: (it) => `${it.dataset.label}: ${it.parsed.y}`,
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          min: xMin,
          max: xMax,
          time: { tooltipFormat: 'yyyy-MM-dd HH:mm' },
          ticks: { color: '#aac' },
          grid: { color: '#2a323c' }
        },
        y: {
          ticks: { color: '#aac' },
          grid: { color: '#2a323c' },
          beginAtZero: true,
        }
      }
    }
  });

  renderStats(seriesMap);
}

function renderStats(seriesMap) {
  const el = document.getElementById('stats');
  el.innerHTML = '';
  [...seriesMap.entries()].forEach(([name, data]) => {
    if (data.length === 0) return;
    const last = data[data.length - 1];
    const first = data[0];
    const delta = last.y - first.y;
    const deltaPct = first.y !== 0 ? ((delta / first.y) * 100).toFixed(1) : '—';
    const cls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'same';
    const sign = delta > 0 ? '+' : '';
    el.insertAdjacentHTML('beforeend', `
      <div class="stat-card">
        <div class="name">${name}</div>
        <div class="val">${last.y}</div>
        <div class="delta ${cls}">${sign}${delta} (${sign}${deltaPct}%) за період</div>
      </div>
    `);
  });
}

// ================ Event wiring ================
document.getElementById('refresh-btn').addEventListener('click', loadData);
document.getElementById('range-select').addEventListener('change', () => {
  saveUI();
  drawChart();
});
document.getElementById('select-all').addEventListener('click', () => {
  document.querySelectorAll('.dept-chip').forEach(el => {
    el.classList.add('active');
    selectedDepts.add(decodeURIComponent(el.dataset.name));
  });
  saveUI();
  drawChart();
});
document.getElementById('select-none').addEventListener('click', () => {
  document.querySelectorAll('.dept-chip').forEach(el => el.classList.remove('active'));
  selectedDepts.clear();
  saveUI();
  drawChart();
});

// ================ Init ================
const savedUI = loadUI();
if (savedUI.range) document.getElementById('range-select').value = savedUI.range;
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
